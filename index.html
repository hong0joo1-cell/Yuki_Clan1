<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki Clan | Official Recruiting</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --main-blue: #00e1ff;
            --dark-bg: #0a0c10;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(0, 225, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* 배경 이미지 및 오버레이 */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://image2url.com/r2/default/images/1772887873068-2eb42932-5e41-4b2b-a530-d7888144afed.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* 눈 내리는 효과 Canvas */
        #snow-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px;
            text-align: center;
        }

        /* 헤더 섹션 */
        header {
            margin-bottom: 80px;
            animation: fadeInDown 1.2s ease;
        }

        .sub-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: var(--main-blue);
            text-transform: uppercase;
        }

        .logo {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, #a5e9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0, 225, 255, 0.4);
            letter-spacing: 15px;
        }

        /* 정보 카드 섹션 */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            transition: 0.3s;
            animation: fadeInUp 1s ease both;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: var(--main-blue);
            box-shadow: 0 0 30px rgba(0, 225, 255, 0.2);
        }

        .card-icon { font-size: 2rem; color: var(--main-blue); margin-bottom: 15px; }
        .card-title { font-weight: 700; margin-bottom: 10px; font-size: 1.2rem; }
        .card-text { font-size: 0.9rem; color: #ccc; }

        /* 가입 조건 섹션 */
        .requirement-box {
            margin-top: 100px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 50px;
            border: 1px dashed var(--border-color);
        }

        .req-list {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .req-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .req-value { font-size: 2.5rem; font-weight: 900; color: var(--main-blue); }
        .req-label { font-size: 1rem; color: #888; }

        /* 가입 버튼 */
        .btn-join {
            display: inline-block;
            margin-top: 60px;
            padding: 20px 60px;
            background: transparent;
            border: 2px solid var(--main-blue);
            color: var(--main-blue);
            text-decoration: none;
            font-weight: 900;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-join:hover {
            background: var(--main-blue);
            color: #000;
            box-shadow: 0 0 40px var(--main-blue);
        }

        /* 애니메이션 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .req-list { gap: 20px; }
            .requirement-box { padding: 30px 15px; }
        }
    </style>
</head>
<body>

<div class="bg-container"></div>
<canvas id="snow-canvas"></canvas>

<div class="container">
    <header>
        <p class="sub-logo">Roblox Rivals Elite Clan</p>
        <h1 class="logo">YUKI</h1>
        <p style="font-size: 1.2rem; color: #fff; font-weight: 300;">
            차가운 이성으로 전장을 지배하라.
        </p>
    </header>

    <div class="intro-grid">
        <div class="glass-card" style="animation-delay: 0.2s;">
            <div class="card-title">PRO SKILLS</div>
            <div class="card-text">실력 있는 클랜원 다수 활동 중</div>
        </div>
        <div class="glass-card" style="animation-delay: 0.4s;">
            <div class="card-title">EVENTS</div>
            <div class="card-text">클랜 내전 및 토너먼트 상시 진행</div>
        </div>
        <div class="glass-card" style="animation-delay: 0.6s;">
            <div class="card-title">REWARDS</div>
            <div class="card-text">스킨 케이스 & 번들 이벤트 지원</div>
        </div>
        <div class="glass-card" style="animation-delay: 0.8s;">
            <div class="card-title">ATMOSPHERE</div>
            <div class="card-text">활발한 소통과 가족 같은 분위기</div>
        </div>
    </div>

    <div class="requirement-box">
        <h2 style="margin-bottom: 40px; font-weight: 900;">가입 조건</h2>
        <div class="req-list">
            <div class="req-item">
                <span class="req-value">60% +</span>
                <span class="req-label">WIN RATE</span>
            </div>
            <div class="req-item">
                <span class="req-value">150 +</span>
                <span class="req-label">LEVEL</span>
            </div>
            <div class="req-item">
                <span class="req-value">1 vs 1</span>
                <span class="req-label">TEST</span>
            </div>
        </div>
    </div>

    <a href="https://open.kakao.com/o/ggsPmfki" target="_blank" class="btn-join">
        JOIN YUKI CLAN
    </a>

    <footer>
        &copy; 2024 YUKI CLAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    // 눈 내리는 효과 스크립트
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, snowflakes = [];

    function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        snowflakes = [];
        for(let i=0; i<150; i++) {
            snowflakes.push(new Snowflake());
        }
    }

    class Snowflake {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 3 + 1;
            this.speed = Math.random() * 1 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.3;
        }
        update() {
            this.y += this.speed;
            if(this.y > height) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        snowflakes.forEach(f => {
            f.update();
            f.draw();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
</script>

</body>
</html>
